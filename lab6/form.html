<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
</head>
<body>

<form action="./thankyou.html" target="_blank">
    <h1 align="center">Student Registration</h1>

    <table align="center" >
        <tr>
            <td>Full Name</td>
            <td><input type="text" placeholder="enter your name...."><br><br>
            </td>
            
        </tr>
        

        <tr>
            <td>Email</td>
            <td><input type="email" placeholder="enter email....">
            <br><br></td>
        </tr>
        

        <tr>
            <td>Mobile No</td>
            <td><input type="tel" placeholder="enter number.....">
            <br><br></td>
        </tr>

        <tr>
            <td>Address</td>
            <td>
                <textarea placeholder="enter address...." rows="4" cols="30"></textarea>
            </td>
        </tr>

        <tr>
            <td>Nationality</td>
            <td><input type="text" placeholder="enter your nation.....">
            <br><br></td>
        </tr>

        <tr>
            <td>Date Of Birth</td>
            <td><input type="date">
            <br><br></td>
        </tr>

        <tr>
            <td>Gender</td>
            <td>
                <input type="radio" name="Gender"> Male
                <input type="radio" name="Gender"> Female
                <br><br>
            </td>
        </tr>

        <tr>
            <td>Highest Degree</td>
            <td>
                <select>
                    <option>Select Degree</option>
                    <option>10th Pass</option>
                    <option>12th Pass</option>
                    <option>Graduated</option>
                
               </select>
                <br><br>
            </td>
        </tr>

        <tr>
            <td>CPI</td>
            <td><input type="number" placeholder="enter your CPI">
             <br><br></td>
        </tr>

        <tr>
            <td>University</td>
            <td><input type="text" placeholder="enter university name......">
             <br><br></td>
        </tr>

        <tr>
            <td>Passing Year</td>
            <td>
                <select>
                    <option>Select Your Passing Year</option>
                    <option>2021</option>
                    <option>2022</option>
                    <option>2023</option>
                    <option>2024</option>
                    <option>2025</option>
                </select>
                 <br><br>
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
                <button type="button">Cancel</button>
            </td>
        </tr>
    </table>
</form>

</body>
</html>
