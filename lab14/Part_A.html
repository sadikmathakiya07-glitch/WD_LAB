<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            border: 2px solid black;
            border-radius: 10px;
            height: 400px;
            width: 400px;
            display: inline-block;
            margin-left: 200px;
            margin-top: 100px;
            background-image: linear-gradient(red,yellow);
        }
        .box2{
            border: 2px solid black;
            border-radius: 10px;
            margin-left: 100px;
            height: 400px;
            width: 400px;
            background-image: radial-gradient(circle,red,yellow,green);
            display: inline-block;
        }


    </style>
</head>
<body>
    <div class="box1">
    </div>
    <div class="box2">
    </div>
</body>
</html>
